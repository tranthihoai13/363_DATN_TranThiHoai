<!-- _product_card.html - Component thẻ sản phẩm (dùng include) -->
<div class="card product-card border-0 shadow-sm h-100 overflow-hidden" style="border-radius: 16px;">
    <a href="{{ url_for('product_detail', product_id=product.id) }}" class="text-decoration-none">
        <div class="position-relative overflow-hidden" style="height: 185px; background-color: #f0f4f0;">
            <img src="{{ url_for('static', filename='uploads/' + (product.image or 'default_food.png')) }}"
                 class="card-img-top w-100 h-100"
                 style="object-fit: cover;"
                 alt="{{ product.name }}"
                 onerror="this.src='https://via.placeholder.com/300x200/2D6A4F/fff?text={{ product.name[:6] }}'">
            {% if product.total_sold > 80 %}
            <span class="position-absolute top-0 end-0 m-2 badge rounded-pill shadow-sm" style="background-color: #FF6B35;">
                <i class="fas fa-fire-flame-curved me-1"></i>Hot
            </span>
            {% endif %}
        </div>
    </a>
    <div class="card-body p-3">
        <span class="badge rounded-pill mb-2" style="background-color: rgba(82,183,136,0.12); color: #2D6A4F; font-size: 0.7rem;">
            {{ product.category.name }}
        </span>
        <a href="{{ url_for('product_detail', product_id=product.id) }}" class="text-decoration-none">
            <h6 class="card-title fw-semibold mb-1 text-truncate" style="color: #2B2D42;">{{ product.name }}</h6>
        </a>
        <p class="text-muted small mb-2 text-truncate">{{ product.description[:60] }}...</p>
        <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold" style="color: #FF6B35; font-size: 1.05rem;">{{ product.formatted_price }}/{{ product.unit }}</span>
        </div>
        <form action="{{ url_for('cart_add') }}" method="POST" class="mt-2">
            <input type="hidden" name="product_id" value="{{ product.id }}">
            <input type="hidden" name="quantity" value="1">
            <button type="submit" class="btn btn-sm w-100 rounded-pill fw-semibold add-cart-btn"
                    style="background-color: #FF6B35; color: #fff; border: none;">
                <i class="fas fa-cart-plus me-1"></i>Thêm vào giỏ
            </button>
        </form>
    </div>
</div>
