{% extends 'base.html' %}
{% block title %}Đăng nhập - FreshMart{% endblock %}

{% block content %}
<section class="py-5" style="min-height: 70vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow" style="border-radius: 20px;">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center mb-3"
                                 style="width: 60px; height: 60px; border-radius: 16px; background-color: rgba(82,183,136,0.12);">
                                <i class="fas fa-leaf fa-lg" style="color: #2D6A4F;"></i>
                            </div>
                            <h3 class="fw-bold" style="color: #2B2D42;">Đăng nhập</h3>
                            <p class="text-muted small">Chào mừng bạn quay lại FreshMart!</p>
                        </div>

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background-color: rgba(45,106,79,0.06); border-color: #e2e8f0; border-radius: 10px 0 0 10px;">
                                        <i class="fas fa-user" style="color: #2D6A4F;"></i>
                                    </span>
                                    <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus
                                           style="border-radius: 0 10px 10px 0;">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background-color: rgba(45,106,79,0.06); border-color: #e2e8f0; border-radius: 10px 0 0 10px;">
                                        <i class="fas fa-lock" style="color: #2D6A4F;"></i>
                                    </span>
                                    <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required
                                           style="border-radius: 0 10px 10px 0;">
                                </div>
                            </div>
                            <button type="submit" class="btn w-100 rounded-pill fw-semibold py-2"
                                    style="background-color: #2D6A4F; color: #fff; border: none; font-size: 1.05rem;">
                                <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <span class="text-muted">Chưa có tài khoản?</span>
                            <a href="{{ url_for('register') }}" class="fw-semibold text-decoration-none" style="color: #FF6B35;">
                                Đăng ký ngay
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
