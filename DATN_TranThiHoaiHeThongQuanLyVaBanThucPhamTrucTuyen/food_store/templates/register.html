{% extends 'base.html' %}
{% block title %}Đăng ký - FreshMart{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow" style="border-radius: 20px;">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center mb-3"
                                 style="width: 60px; height: 60px; border-radius: 16px; background-color: rgba(82,183,136,0.12);">
                                <i class="fas fa-leaf fa-lg" style="color: #2D6A4F;"></i>
                            </div>
                            <h3 class="fw-bold" style="color: #2B2D42;">Tạo tài khoản</h3>
                            <p class="text-muted small">Đăng ký để mua sắm thực phẩm tươi ngon mỗi ngày!</p>
                        </div>

                        <form method="POST">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Tên đăng nhập <span class="text-danger">*</span></label>
                                    <input type="text" name="username" class="form-control" placeholder="username" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Họ và tên</label>
                                    <input type="text" name="full_name" class="form-control" placeholder="Nguyễn Văn A">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                                    <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Số điện thoại</label>
                                    <input type="tel" name="phone" class="form-control" placeholder="0901234567">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
                                    <input type="password" name="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                                    <input type="password" name="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu" required>
                                </div>
                            </div>

                            <button type="submit" class="btn w-100 rounded-pill fw-semibold py-2 mt-4"
                                    style="background-color: #FF6B35; color: #fff; border: none; font-size: 1.05rem;">
                                <i class="fas fa-user-plus me-2"></i>Đăng ký
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <span class="text-muted">Đã có tài khoản?</span>
                            <a href="{{ url_for('login') }}" class="fw-semibold text-decoration-none" style="color: #2D6A4F;">
                                Đăng nhập
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
